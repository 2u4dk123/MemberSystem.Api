<!DOCTYPE html>
<html lang="zh-TW">
<head>
     <meta charset="UTF-8">
     <title>Rost 的會員系統 - 結案版</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
     <div class="container mt-5">
          <div class="row justify-content-center">
               <div class="col-md-6 card shadow p-4">
                    <h2 class="text-center mb-4">會員系統測試 (AJAX)</h2>

                    <div class="mb-3">
                         <label class="form-label">姓名 (註冊用)</label>
                         <input type="text" id="name" class="form-control" placeholder="Rost">
                    </div>
                    <div class="mb-3">
                         <label class="form-label">Email</label>
                         <input type="email" id="email" class="form-control" placeholder="test@gmail.com">
                    </div>
                    <div class="mb-3">
                         <label class="form-label">密碼</label>
                         <input type="password" id="password" class="form-control">
                    </div>

                    <div class="d-grid gap-2">
                         <button class="btn btn-primary" onclick="handleRegister()">立即註冊</button>
                         <button class="btn btn-success" onclick="handleLogin()">登入拿 Token (JWT)</button>
                    </div>

                    <hr>
                    <h5>執行結果：</h5>
                    <pre id="result" class="bg-dark text-success p-3" style="min-height: 100px;">等待操作...</pre>
               </div>
          </div>
     </div>

     <script>
        const resultBox = document.getElementById('result');

        // 1. AJAX 註冊
        async function handleRegister() {
            const user = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value
            };
            const password = document.getElementById('password').value;

            // 這就是 AJAX：發送 POST 請求
            const response = await fetch(`/api/users/register?password=${password}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });

            const data = await response.json();
            resultBox.innerText = JSON.stringify(data, null, 2);
        }

        // 2. AJAX 登入
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch(`/api/users/login?email=${email}&password=${password}`, {
                method: 'POST'
            });

            if (response.ok) {
                const data = await response.json();
                // 把 Token 存起來！
                localStorage.setItem('token', data.token);
                resultBox.innerText = "登入成功！Token 已存入 LocalStorage：\n" + data.token;
            } else {
                resultBox.innerText = "登入失敗，請檢查帳密。";
            }
        }
     </script>
</body>
</html>
